name: CI/CD Inovatech EKS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  ECR_REPO_FRONTEND: ecr-frontend-inovatech
  ECR_REPO_BACKEND_VENTAS: ecr-backend-ventas-inovatech
  ECR_REPO_BACKEND_DESPACHO: ecr-backend-despacho-inovatech
  ECR_REPO_DB: ecr-db-inovatech

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Definir tag de imagen
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build JAR BACKEND VENTAS
        run: |
          cd backend/back-Ventas_SpringBoot/Springboot-API-REST
          chmod +x mvnw || true
          ./mvnw clean package -DskipTests

      - name: Build JAR BACKEND DESPACHO
        run: |
          cd backend/back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          chmod +x mvnw || true
          ./mvnw clean package -DskipTests

      - name: Build & push FRONTEND
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd frontend
          docker build \
            -t $ECR_REGISTRY/${ECR_REPO_FRONTEND}:${IMAGE_TAG} \
            -t $ECR_REGISTRY/${ECR_REPO_FRONTEND}:eks-v1 \
            .
          docker push $ECR_REGISTRY/${ECR_REPO_FRONTEND}:${IMAGE_TAG}
          docker push $ECR_REGISTRY/${ECR_REPO_FRONTEND}:eks-v1

      - name: Build & push BACKEND VENTAS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd backend/back-Ventas_SpringBoot/Springboot-API-REST
          docker build \
            -t $ECR_REGISTRY/${ECR_REPO_BACKEND_VENTAS}:${IMAGE_TAG} \
            -t $ECR_REGISTRY/${ECR_REPO_BACKEND_VENTAS}:eks-v1 \
            .
          docker push $ECR_REGISTRY/${ECR_REPO_BACKEND_VENTAS}:${IMAGE_TAG}
          docker push $ECR_REGISTRY/${ECR_REPO_BACKEND_VENTAS}:eks-v1

      - name: Build & push BACKEND DESPACHO
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd backend/back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          docker build \
            -t $ECR_REGISTRY/${ECR_REPO_BACKEND_DESPACHO}:${IMAGE_TAG} \
            -t $ECR_REGISTRY/${ECR_REPO_BACKEND_DESPACHO}:eks-v1 \
            .
          docker push $ECR_REGISTRY/${ECR_REPO_BACKEND_DESPACHO}:${IMAGE_TAG}
          docker push $ECR_REGISTRY/${ECR_REPO_BACKEND_DESPACHO}:eks-v1

      - name: Build & push DB
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd db
          docker build \
            -t $ECR_REGISTRY/${ECR_REPO_DB}:${IMAGE_TAG} \
            -t $ECR_REGISTRY/${ECR_REPO_DB}:eks-v1 \
            .
          docker push $ECR_REGISTRY/${ECR_REPO_DB}:${IMAGE_TAG}
          docker push $ECR_REGISTRY/${ECR_REPO_DB}:eks-v1

      - name: Instalar kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.0

      - name: Configurar kubeconfig para EKS
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $EKS_CLUSTER_NAME
          kubectl config current-context

      - name: Aplicar manifests base (Base de Datos)
        env:
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
          DB_IP_PRIVADA: tienda-db
          DB_PORT: ${{ secrets.DB_PORT || '3306' }}
          DB_NAME: ${{ secrets.DB_NAME || 'tienda' }}
          DB_USERNAME: ${{ secrets.DB_USERNAME || 'alumno' }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD || 'alumno123' }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPO_DB: ${{ env.ECR_REPO_DB }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          # Crear Namespace si no existe
          envsubst < k8s/namespace.yaml | kubectl apply -f -

          # Crear Secreto de Conexión a la BD (tienda-db = servicio K8s MySQL)
          envsubst < k8s/db-secret.yaml | kubectl apply -f -

          # Crear PVC para persistencia de datos MySQL (solo crea si no existe, nunca borra)
          echo "Aplicando PersistentVolumeClaim para MySQL..."
          envsubst < k8s/mysql-pvc.yaml | kubectl apply -f -

          # Desplegar MySQL dentro de EKS (apply es idempotente: actualiza imagen sin borrar datos)
          echo "Desplegando MySQL dentro de EKS como pod (tienda-db)..."
          envsubst < k8s/mysql-deployment.yaml | kubectl apply -f -
          envsubst < k8s/mysql-service.yaml | kubectl apply -f -

          # Esperar a que MySQL esté listo antes de desplegar backends
          echo "Esperando que MySQL esté listo..."
          kubectl rollout status deployment/tienda-db -n $EKS_NAMESPACE --timeout=120s

      - name: Actualizar BACKEND VENTAS en EKS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPO_BACKEND_VENTAS: ${{ env.ECR_REPO_BACKEND_VENTAS }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          envsubst < k8s/backend-deployment-ventas.yaml | kubectl apply -f -
          envsubst < k8s/backend-service-ventas.yaml | kubectl apply -f -
          kubectl rollout status deployment/tienda-backend-ventas -n $EKS_NAMESPACE

      - name: Actualizar BACKEND DESPACHO en EKS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPO_BACKEND_DESPACHO: ${{ env.ECR_REPO_BACKEND_DESPACHO }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          envsubst < k8s/backend-deployment-despacho.yaml | kubectl apply -f -
          envsubst < k8s/backend-service-despacho.yaml | kubectl apply -f -
          kubectl rollout status deployment/tienda-backend-despacho -n $EKS_NAMESPACE

      - name: Actualizar FRONTEND en EKS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPO_FRONTEND: ${{ env.ECR_REPO_FRONTEND }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          envsubst < k8s/frontend-deployment.yaml | kubectl apply -f -
          envsubst < k8s/frontend-service.yaml | kubectl apply -f -
          kubectl rollout status deployment/tienda-frontend -n $EKS_NAMESPACE

      - name: Aplicar HPA
        env:
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          if [ -f k8s/backend-hpa-ventas.yaml ]; then envsubst < k8s/backend-hpa-ventas.yaml | kubectl apply -f -; fi
          if [ -f k8s/backend-hpa-despacho.yaml ]; then envsubst < k8s/backend-hpa-despacho.yaml | kubectl apply -f -; fi
          if [ -f k8s/frontend-hpa.yaml ]; then envsubst < k8s/frontend-hpa.yaml | kubectl apply -f -; fi

      - name: Ver estado final
        env:
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          kubectl get pods -n $EKS_NAMESPACE
          kubectl get svc -n $EKS_NAMESPACE
          kubectl get hpa -n $EKS_NAMESPACE || true