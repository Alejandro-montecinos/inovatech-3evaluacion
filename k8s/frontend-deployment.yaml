apiVersion: apps/v1
kind: Deployment
metadata:
  name: tienda-frontend
  namespace: ${EKS_NAMESPACE}
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tienda-frontend
  template:
    metadata:
      labels:
        app: tienda-frontend
    spec:
      containers:
        - name: frontend
          image: ${ECR_REGISTRY}/${ECR_REPO_FRONTEND}:${IMAGE_TAG}
          ports:
            - containerPort: 80
          env:
            - name: BACKEND_VENTAS_HOST
              value: "tienda-backend-ventas"
            - name: BACKEND_VENTAS_PORT
              value: "8082"
            - name: BACKEND_DESPACHO_HOST
              value: "tienda-backend-despacho"
            - name: BACKEND_DESPACHO_PORT
              value: "8081"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"

          # HEALTH CHECKS
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10

