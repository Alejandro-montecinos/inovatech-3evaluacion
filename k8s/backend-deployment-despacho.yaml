apiVersion: apps/v1
kind: Deployment
metadata:
  name: tienda-backend-despacho
  namespace: ${EKS_NAMESPACE}
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tienda-backend-despacho
  template:
    metadata:
      labels:
        app: tienda-backend-despacho
    spec:
      containers:
        - name: backend
          image: ${ECR_REGISTRY}/${ECR_REPO_BACKEND_DESPACHO}:${IMAGE_TAG}
          ports:
            - containerPort: 8081
          env:
            - name: DB_IP_PRIVADA
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_IP_PRIVADA
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_NAME
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_PASSWORD

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1024Mi"
          startupProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 0
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 0
            periodSeconds: 15