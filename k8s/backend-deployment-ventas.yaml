apiVersion: apps/v1
kind: Deployment
metadata:
  name: tienda-backend-ventas
  namespace: ${EKS_NAMESPACE}
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tienda-backend-ventas
  template:
    metadata:
      labels:
        app: tienda-backend-ventas
    spec:
      containers:
        - name: backend
          image: ${ECR_REGISTRY}/${ECR_REPO_BACKEND_VENTAS}:${IMAGE_TAG}
          ports:
            - containerPort: 8082
          env:
            - name: DB_IP_PRIVADA
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_IP_PRIVADA
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_NAME
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_PASSWORD
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8082
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8082
            initialDelaySeconds: 40
            periodSeconds: 15