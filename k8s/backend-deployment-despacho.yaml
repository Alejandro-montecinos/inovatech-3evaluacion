apiVersion: apps/v1
kind: Deployment
metadata:
  name: tienda-backend-despacho
  namespace: inovatech
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tienda-backend-despacho
  template:
    metadata:
      labels:
        app: tienda-backend-despacho
    spec:
      containers:
        - name: backend
          image: 042379109745.dkr.ecr.us-east-1.amazonaws.com/ecr-backend-despacho-inovatech:eks-v1
          ports:
            - containerPort: 8081
          env:
            - name: DB_IP_PRIVADA
              value: "10.0.10.61"
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: "despacho"
            - name: DB_USERNAME
              value: "alumno"
            - name: DB_PASSWORD
              value: "alumno123"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10